    technique_id: T1110
    confidence: 0.7
  - tactic: TA0001
    technique_id: T1190
    confidence: 0.7
  - tactic: TA0001
    technique_id: T1566
    confidence: 0.7
evidence_fields:
  - abuseipdb_categories
  - abuse_confidence_score
