  AbuseIPDB category → ATT&CK technique mapping per Appendix A.10.
  IntelLifter reads AttackerIntel.abuseipdb_categories and emits
  one tag per matching category code.
applies_to:
  - intel
match:
  kind: lifter:intel_abuseipdb
  provider: abuseipdb
emits:
