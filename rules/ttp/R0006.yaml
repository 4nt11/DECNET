rule_id: R0006
rule_version: 1
name: default_credentials
description: |
  Login attempt with a known default credential pair (root/root,
  admin/admin, etc.). BehavioralLifter (E.3.9) reads credentials
  table.
applies_to:
  - auth_attempt
match:
  kind: lifter:default_credentials
  pairs:
    - [root, root]
    - [admin, admin]
    - [admin, password]
    - [root, ""]
    - [pi, raspberry]
emits:
  - tactic: TA0001
    technique_id: T1078
    sub_technique_id: T1078.001
    confidence: 0.9
evidence_fields:
  - username
  - service
